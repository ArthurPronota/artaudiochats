    <script>
    var Manager = {
        baseUrl:        "",
        timeInterval:   500,    // 0.5 sec
        countErrorLoading: 0,   // number of errors in loading

        languages:      {},     // available languages
        soundInDevice:  {},     // list of real microphones
        soundOutDevice: {},     // list of real speakers
        mainConfig:     {},     // main configuration
        talkersConfig:  {},     // configuration of interlocutors
        langLables:     {},     // language tags
        browsers:       {},     // Acceptable browsers
        listCommands:   [],     // list of commands
        refreshIntervalId: 0,   // intervalID
        timeStampStart: 0,      // start timestamp

        statusChat:     false,  // chat status

        // loading all languages
        loadLanguages:     function(langs_in) {
            if(! (typeof langs_in === 'object' && !Array.isArray(langs_in) && langs_in !== null)) {
                console.error(`langs_in is ${typeof(langs_in)}`) ;
                return ;
            }
            
            // sorting an object by keys (language names)
            Manager.languages = Object.keys(langs_in).sort().reduce(
                    (obj, key) => {
                            obj[key] = langs_in[key];
                            return obj;
                    },
                    {}
                );
        },

        // loading language tags
        loadLangLables:     function(lang_labels) {
            if(! (typeof lang_labels === 'object' && !Array.isArray(lang_labels) && lang_labels !== null)) {
                console.error(`lang_labels is ${typeof(lang_labels)}`) ;
                return ;
            }

            for(let key of Object.keys(lang_labels)) {
                if(typeof(key) !== "string") {
                    console.error(`key is ${typeof(key)}`) ;
                    continue ;
                }
                else if(! (typeof lang_labels[key] === 'object' && !Array.isArray(lang_labels[key]) && lang_labels[key] !== null)) {
                    console.error(`lang_labels[${key}] is ${typeof(lang_labels[key])}`) ;
                    continue ;
                }
            }

            Manager.langLables = lang_labels ;

        },

        // loading real microphones
        loadSoundInDevice:  function(sound_in) {
            if(! (typeof sound_in === 'object' && !Array.isArray(sound_in) && sound_in !== null)) {
                console.error(`sound_in is ${typeof(sound_in)}`) ;
                return ;
            }

            for (let key in sound_in) {
                if(sound_in.hasOwnProperty(key)) {
                    if(typeof(key) !== 'string') {
                        console.error(`key is ${typeof(key)}`) ;
                        continue ;
                    }
                    else if(! Number.isInteger(sound_in[key])) {
                        console.error(`sound_in[${key}] is ${typeof(sound_in[key])}`) ;
                        continue ;
                    }
                    else if(sound_in[key] < 0) {
                        console.error(`Invalid value: ${sound_in[key]} of sound_in[${key}]`) ;
                        continue ;
                    }
                }
            }
            Manager.soundInDevice = sound_in ;
        },

        // loading real speakers
        loadSoundOutDevice:  function(sound_out) {
            if(! (typeof sound_out === 'object' && !Array.isArray(sound_out) && sound_out !== null)) {
                console.error(`sound_out is ${typeof(sound_out)}`) ;
                return ;
            }

            for (let key in sound_out) {
                if(sound_out.hasOwnProperty(key)) {
                    if(typeof(key) !== 'string') {
                        console.error(`key is ${typeof(key)}`) ;
                        continue ;
                    }
                    else if(! Number.isInteger(sound_out[key])) {
                        console.error(`sound_out[${key}] is ${typeof(sound_out[key])}`) ;
                        continue ;
                    }
                    else if(sound_out[key] < 0) {
                        console.error(`Invalid value: ${sound_out[key]} of sound_out[${key}]`) ;
                        continue ;
                    }
                }
            }
            Manager.soundOutDevice = sound_out ;
        },

        // loading the main configuration
        loadMainConfig:     function(main_conf) {
            if(! (typeof main_conf === 'object' && !Array.isArray(main_conf) && main_conf !== null)) {
                console.error(`main_conf is ${typeof(main_conf)}`) ;
                return ;
            }

            Manager.mainConfig = main_conf ;
        },

        // loading configs for all interlocutors
        loadTalkersConfig:      function(talkers_conf) {
            if(! (typeof talkers_conf === 'object' && !Array.isArray(talkers_conf) && talkers_conf !== null)) {
                console.error(`talkers_conf is ${typeof(talkers_conf)}`) ;
                return ;
            }

            for (let key in talkers_conf) {
                if(typeof(key) != "string") {
                    console.error(`key is ${typeof(key)}`) ;
                    return ;
                }
                else if(! (typeof(talkers_conf[key]) === 'object' && !Array.isArray(talkers_conf[key]) && talkers_conf[key] !== null)) {
                    console.error(`talkers_conf[${key}] is ${typeof(talkers_conf[key])}`) ;
                    return ;
                }
            }            

            Manager.talkersConfig = talkers_conf ;

            Manager.ListUsers.addAllUsers() ;
        },

        // loading multiple chats
        loadChats:  function(chats_in) {
            if(! (typeof chats_in === 'object' && !Array.isArray(chats_in) && chats_in !== null)) {
                console.error(`chats_in is ${typeof(chats_in)}`) ;
                return ;
            }

            // user_id check
            let key_user_id = "user_id" ;
            if(! (key_user_id in chats_in)) {
                console.error(`Not found key: chats_in[${key_user_id}]`) ;
                return ;
            } else if(! Number.isInteger(chats_in[key_user_id])) {
                console.error(`chats_in[${key_user_id}] is ${typeof(chats_in[key_user_id])}`) ;
                return ;
            } else if(chats_in[key_user_id] < 1) {
                console.error(`Invalid value: ${chats_in[key_user_id]} of chats_in[${key_user_id}]`) ;
                return ;
            }

            let user_name = '' ;
            for(let key_tmp in Manager.talkersConfig) { 
                if(Manager.talkersConfig[key_tmp].id == chats_in[key_user_id]) {
                    user_name = key_tmp ;
                    break ;
                }
            }

            if(! user_name) {
                console.error("Undefined user_name") ;
                return ;
            }

            // checking chats
            let key_chats = 'chats' ;
            if(! (key_chats in chats_in)) {
                console.error(`Not found key: chats_in[${key_chats}]`) ;
                return ;
            } else if(! (typeof chats_in[key_chats] === 'object' && !Array.isArray(chats_in[key_chats]) && chats_in[key_chats] !== null)) {
                console.error(`chats_in[${key_chats}] is ${typeof(chats_in[key_chats])}`) ;
                return ;
            }
            
            let list_add_chats = [] ;
            for(let chat_id_tmp in chats_in[key_chats]) {
                if(chat_id_tmp in Manager.talkersConfig[user_name][key_chats]) {
                    if(Manager.talkersConfig[user_name][key_chats][chat_id_tmp] === 0) {
                        Manager.talkersConfig[user_name][key_chats][chat_id_tmp] = chats_in[key_chats][chat_id_tmp] ;
                        list_add_chats.push(chat_id_tmp) ;
                    }
                }
            }

            if(list_add_chats.length
               && Manager.TopMenu.ObjUser
               && Manager.TopMenu.ObjUser.getAttribute('user_id')
               && parseInt(Manager.TopMenu.ObjUser.getAttribute('user_id'), 10) == chats_in[key_user_id]
            ) {
                list_add_chats = list_add_chats
                                    .map(function (x) {
                                            return parseInt(x, 10);
                                    })
                                    .sort() ;
                Manager.UserMessages.loadBaseData(chats_in[key_user_id], 
                                         	      list_add_chats
                                        	     );
            }
        },

        // script completion
        parseExit:        function(command_data) {
            if(! (typeof command_data === 'object' && !Array.isArray(command_data) && command_data !== null)) {
                console.error(`command_data is ${typeof(command_data)}`) ;
                return ;
            }

            // user_id check
            let key_time = "time" ;
            if(! (key_time in command_data)) {
                console.error(`Not found key: command_data[${key_time}]`) ;
                return ;
            } else if(! Number.isInteger(command_data[key_time])) {
                console.error(`command_data[${key_time}] is ${typeof(command_data[key_time])}`) ;
                return ;
            } else if(command_data[key_time] < 1) {
                console.error(`Invalid value: ${command_data[key_time]} of chats_in[${key_user_id}]`) ;
                return ;
            }

            window.location.reload() ;  // reload page
        },

        // data on the stopped chat
        loadStopedChat:     function(command_data) {

            if(! (typeof command_data === 'object' && !Array.isArray(command_data) && command_data !== null)) {
                console.error(`command_data is ${typeof(command_data)}`) ;
                return ;
            }

            if(command_data.main) {
                Manager.WaitingScreen.hide() ;
            }

            // user_id check
            let key_user_id = "user_id" ;
            if(! (key_user_id in command_data)) {
                console.error(`Not found key: command_data[${key_user_id}]`) ;
                return ;
            } else if(! Number.isInteger(command_data[key_user_id])) {
                console.error(`command_data[${key_user_id}] is ${typeof(command_data[key_user_id])}`) ;
                return ;
            }

            // num_chat verification
            let key_num_chat = "num_chat" ;
            if(! (key_num_chat in command_data)) {
                console.error(`Not found key: command_data[${key_num_chat}]`) ;
                return ;
            } else if(! Number.isInteger(command_data[key_num_chat])) {
                console.error(`command_data[${key_num_chat}] is ${typeof(command_data[key_num_chat])}`) ;
                return ;
            } else if(command_data[key_num_chat] < 0) {
                console.error(`Invalid value: ${command_data[key_num_chat]} of command_data[${key_num_chat}]`) ;
                return ;
            }

            // time check
            let key_time = "time" ;
            if(! (key_time in command_data)) {
                console.error(`Not found key: command_data[${key_time}]`) ;
                return ;
            } else if(! Number.isInteger(command_data[key_time])) {
                console.error(`command_data[${key_time}] is ${typeof(command_data[key_time])}`) ;
                return ;
            } else if(command_data[key_time] < 0) {
                console.error(`Invalid value: ${command_data[key_time]} of command_data[${key_time}]`) ;
                return ;
            }

            if(! Manager.UserMessages.Obj) {
                console.error("Undefined UserMessages.Obj") ;
                return ;
            } else if(! Manager.TopMenu.ObjUser) {
                console.error("Undefined TopMenu.ObjUser") ;
                return ;
            }

            if(! Manager.TopMenu.ObjStartChat) {
                console.error("Undefined ObjStartChat") ;
                return ;
            } else if(! Manager.TopMenu.ObjStopChat) {
                console.error("Undefined ObjStopChat") ;
                return ;
            }


            let user_id = parseInt(Manager.TopMenu.ObjUser.getAttribute("user_id"), 10) ;
            if(user_id < 1) {
                return ;
            }

            if(user_id != command_data[key_user_id]) {
                return ;
            }

            let list_bottons = Manager.UserMessages.Obj.querySelectorAll(".button_chat_action") ;

            let attr_act = "act" ;
            let attr_num_chat = "num_chat" ;
            let num_chat_val = 0, 
                num_chat_last = 0 ;

            for(let i = 0 ; i < list_bottons.length ; i++) {
                num_chat_val = parseInt(list_bottons[i].getAttribute(attr_num_chat), 10) ;
                if(list_bottons[i].getAttribute(attr_act) != "d"
                   && num_chat_val == command_data[key_num_chat]) {
                    list_bottons[i].setAttribute(attr_act, "d") ;
                    list_bottons[i].replaceChildren() ;
                    list_bottons[i].appendChild(document.createTextNode(Manager.langLables["deletechat"][Manager.mainConfig.lang])) ;
                    num_chat_last = num_chat_val ;
                }
            }

            if(num_chat_last) {
                let button_act = Manager.UserMessages.Obj.querySelector(".width_button") ;
                if(button_act) {
                    button_act.replaceChildren() ;
                    button_act.setAttribute("act", "s") ;   // (s)tart chat
                    button_act.appendChild(document.createTextNode(Manager.langLables["startchat"][Manager.mainConfig.lang])) ;
                    Manager.TopMenu.ObjStartChat.style.display = 'inline' ;
                    Manager.TopMenu.ObjStopChat.style.display = 'none' ;
                }
            }

        },

        // data on the interlocutor's configuration has been saved
        loadSavedUserConfig:     function(command_data) {

            Manager.WaitingScreen.hide() ;

            if(! (typeof command_data === 'object' && !Array.isArray(command_data) && command_data !== null)) {
                console.error(`command_data is ${typeof(command_data)}`) ;
                return ;
            }
            
            let old_user_name ;

            for(let user_name_ in Manager.talkersConfig) { 
                if(Manager.talkersConfig[user_name_].id == command_data.id) {
                    old_user_name = user_name_ ;
                    break ;
                }
            }

            if(command_data["name"] in Manager.talkersConfig) {
                if(command_data.id != Manager.talkersConfig[command_data["name"]].id) {
                    alert(Manager.langLables["duplicatenickname"][Manager.mainConfig.lang]) ;
                    return ;
                }
            }

            if(old_user_name) { // user data found
                Manager.talkersConfig[old_user_name]["id"] = command_data["id"] ;
                Manager.talkersConfig[old_user_name]["img"] = command_data["img"] ;
                Manager.talkersConfig[old_user_name]["lang"] = command_data["lang"] ;
                Manager.talkersConfig[old_user_name]["name"] = command_data["name"] ;
                Manager.talkersConfig[old_user_name]["about"] = command_data["about"] ;
                Manager.talkersConfig[old_user_name]["usemic"] = command_data["usemic"] ;

                            old_user_name
                        )
                    ) ;
                    delete Manager.talkersConfig[old_user_name];

                    name:   command_data["name"],

        // Processing a successful chat deletion
        loadChatDeleted:       function(command_data) {

            Manager.WaitingScreen.hide() ;

            if(! Manager.TopMenu.ObjUser) {
                console.error("Undefined TopMenu.ObjUser") ;
                return ;
            } else if(! Manager.UserMessages.Obj) {
                console.error("Undefined UserMessages.Obj") ;
                return ;
            }

            if(parseInt(Manager.TopMenu.ObjUser.getAttribute("user_id"), 10) != command_data.user_id) {
                console.error(`Invalid user_id: ${command_data.user_id}`) ;
                return ;                
            }

            let ListNods = Manager.UserMessages.Obj.childNodes ;

            for(const node_tmp of ListNods) {
                if(node_tmp.tagName && node_tmp.getAttribute("num_chat")) {
                    if(parseInt(node_tmp.getAttribute("num_chat"), 10) == command_data.num_chat) {
                        node_tmp.parentNode.removeChild(node_tmp) ;
                    }
                }
            }

            let user_name ;

            for(let user_name_ in Manager.talkersConfig) { 
                if(Manager.talkersConfig[user_name_].id == command_data.user_id) {
                    user_name = user_name_ ;
                    break ;
                }
            }

            if(user_name === undefined) {
                console.error(`Invalid id_user: ${command_data["user_id"]}`) ;
                return ;
            }

            // deleting chat data
            if(Manager.talkersConfig[user_name].chats[command_data.num_chat]) {
                delete Manager.talkersConfig[user_name].chats[command_data.num_chat] ;
            }

            let list_chats = Object
                            .keys(Manager.talkersConfig[user_name].chats)
                            .map(function (x) {
                                    return parseInt(x, 10);
                                })
                            .sort((a, b) => b - a)
                            ;
            let last_ts = 0,
                last_mess = '' ;

            for(let i = 0; i < list_chats.length; i++) {
                for(let j = Manager.talkersConfig[user_name].chats[list_chats[i]].length - 1 ; j >= 0 ; j--) {
                    if(Manager.talkersConfig[user_name].chats[list_chats[i]][j].type == 'N') {
                       last_ts = Manager.talkersConfig[user_name].chats[list_chats[i]][j].time ;
                       last_mess = Manager.talkersConfig[user_name].chats[list_chats[i]][j].side == 'in' ? Manager.talkersConfig[user_name].chats[list_chats[i]][j].translated : Manager.talkersConfig[user_name].chats[list_chats[i]][j].source ;
                       break ;
                    }
                }
                if(last_ts) {
                    break ;
                }
            }

            // set the last message to the left column
            let node_left = window.document.getElementById(`user_${command_data["user_id"]}`) ;

            if(! node_left) {
                console.error("Undefined node_left") ;
                return ;
            }

            let node_left_date = node_left.querySelector(".native_date") ;
            if(! node_left_date) {
                console.error("Undefined node_left_date") ;
                return ;
            }
            node_left_date.replaceChildren() ;
            node_left_date.setAttribute("ts", last_ts) ;
            if(last_ts) {
                let date_string = new Date(last_ts * 1000)
                                        .toLocaleDateString(
                                            Manager.mainConfig.lang,
                                            Manager.ListUsers.optionsShortDate
                                        )
                                ;
                node_left_date.appendChild(window.document.createTextNode(date_string)) ;
            }

            let node_left_mess = node_left.querySelector(".native_text") ;
            if(! node_left_mess) {
                console.error("Undefined node_left_mess") ;
                return ;
            }
            node_left_mess.replaceChildren() ;
            if(last_mess.length) {
                node_left_mess.appendChild(window.document.createTextNode(last_mess)) ;
            }
        },

        loadData:   function() {
            
            if(Manager.baseUrl == ""){
                return ;
            }
        
            var xmlHttp = new XMLHttpRequest();
            xmlHttp.onreadystatechange = function() {
                if(xmlHttp.readyState == 4) {    // the request has been processed and the response is ready
                    if(xmlHttp.status == 200) {  // the request was successful
                        Manager.countErrorLoading = 0 ;
                        for(let i = 0 ; i < xmlHttp.response.length ; i++) {
                            let keys = Object.keys(xmlHttp.response[i]) ;
                            if(keys.length != 1) {
                                console.error(`Invalid size: ${keys.length} of keys`) ;
                                continue ;
                            }

                            switch(keys[0]) {
                                case "leftright":           // loading left-right div
                                    Manager.LeftRight.loadLeftRight(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;                                
                                case "langs":           // loading available languages
                                    Manager.loadLanguages(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "lables":           // loading language tags
                                    Manager.loadLangLables(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;                                    
                                case "sound_in_load":   // microphone data
                                    Manager.loadSoundInDevice(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "sound_out_load":   // data on speakers
                                    Manager.loadSoundOutDevice(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "main_conf_load":  // main configuration
                                    Manager.loadMainConfig(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "talk_cong_load":  // loading data on interlocutors
                                    Manager.loadTalkersConfig(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "chats":  // loading multiple chats
                                    Manager.loadChats(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "ended":   // stop script
                                    Manager.parseExit(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break;
                                case "stopedchat":  // data on the stopped chat
                                    Manager.loadStopedChat(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "saveduserconfig": // The interlocutor's config has been saved
                                    Manager.loadSavedUserConfig(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "dupnickname": // duplicate of the interlocutor's nickname
                                    Manager.loadDupNickname(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidlang": // Inappropriate language
                                    Manager.loadInvalidLang(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidimg": // Invalid image
                                    Manager.loadInvalidImg(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "historycleared": // clear user history
                                    Manager.loadHistoryCleared(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "userdeleted": // deleting a user
                                    Manager.loadUserDeleted(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "mainconfigsaved": // deleting an interlocutor
                                    Manager.loadMainconfigSaved(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "browsers": // Loading browsers
                                    Manager.loadBrowsers(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidbrowser": // invalid browser
                                    Manager.loadInvalidBrowser(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidmic": // Invalid microphone
                                    Manager.loadInvalidMic(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidsound": // invalid speaker
                                    Manager.loadInvalidSound(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invaliduser": // unacceptable interlocutor
                                    Manager.loadInvalidUser(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "startingchat": // starting a chat
                                    Manager.loadStartingChat(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "firstpartchatnow": // new chat title received
                                    Manager.loadFirstPartChatNow(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "nextpartchatnow": // new chat messages received
                                    Manager.loadNextPartChatNow(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "chatdeleted": // received a message about chat deletion
                                    Manager.loadChatDeleted(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "errdelchat": // chat deletion error
                                    Manager.loadErrDelChat(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "invalidchatnumber": // Invalid chat N
                                    Manager.loadInvalidChatNumber(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;
                                case "helpdata": // loading help
                                    Manager.Help.loadHelpData(eval('('+ xmlHttp.response[i][keys[0]] +')'));
                                    break ;                                    
                                default:
                                    console.error(`Invalid key: ${keys[0]}`) ;
                            }
                        }
                    } else if(xmlHttp.status == 0) { // connection failed
                        if(++Manager.countErrorLoading >= 20) {
                            if(Manager.refreshIntervalId != 0) {
                                clearInterval(Manager.refreshIntervalId) ;
                                Manager.refreshIntervalId = 0;
                                window.document.write("<h1>Closed</h1>") ;
                            }
                        }
                    }
                }
            }

            let list_com = [],
                uniq_hashes = {} ;

            while(Manager.listCommands.length) {
                let unit_data = Manager.listCommands.pop() ;
                let key_unit = JSON.stringify(unit_data) ;
                if(!(key_unit in uniq_hashes)) {
                    list_com.unshift(unit_data) ;
                    uniq_hashes[key_unit] = "" ;
                }
            }

            if(list_com) {
                xmlHttp.open("GET", Manager.baseUrl + `?q=${encodeURIComponent(JSON.stringify(list_com))}`, true); // true for asynchronous
                xmlHttp.responseType = 'json';             
                xmlHttp.send(null);
            }

                    Manager.ListUsers.addUser(user_id) ;

                            if(Math.floor(Date.now() / 1000) - time_end > 0) {
                                let curr_text = Manager.WaitingScreen.CurrentText ;
                                Manager.WaitingScreen.hide() ;
                                if(curr_text == Manager.WaitingScreen.LoadingText) { // Loading ...
                                    window.location.reload() ;
                                } else if(Manager.mainConfig && Manager.langLables) { // There is data on mainConfig & langLables
                                    alert(Manager.langLables["repeatcurrentoperation"][Manager.mainConfig.lang]) ;

                    console.error("Undefined DetNode") ;
                    return ;

                }

                Manager.WaitingScreen.CurrentText = text_in ;
                Manager.WaitingScreen.TimeStart = Math.floor(Date.now() / 1000) ;

    <script>
        const resizer = document.getElementById('resizer');
        const leftCol = document.getElementById('left-column');
        const rightCol = document.getElementById('right-column');
        const content = document.getElementById('content');
        
        let isResizing = false;
        let lastX = 0;
        let leftWidth = 0;
        
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            lastX = e.clientX;
            leftWidth = leftCol.offsetWidth;
            document.body.style.cursor = 'col-resize';
            leftCol.style.userSelect = 'none';
            leftCol.style.pointerEvents = 'none';
            rightCol.style.userSelect = 'none';
            rightCol.style.pointerEvents = 'none';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            const dx = e.clientX - lastX;
            const newLeftWidth = leftWidth + dx;
            
            const minWidth = 100;

            let containerWidth = content.offsetWidth;
            if (newLeftWidth < minWidth) {
                leftCol.style.width = `${minWidth}px`;
                rightCol.style.width = `${containerWidth - minWidth - resizer.offsetWidth}px`;
            } else if (newLeftWidth > containerWidth - minWidth - resizer.offsetWidth) {
                leftCol.style.width = `${containerWidth - minWidth - resizer.offsetWidth}px`;
                rightCol.style.width = `${minWidth}px`;
            } else {
                leftCol.style.width = `${newLeftWidth}px`;
                rightCol.style.width = `${containerWidth - newLeftWidth - resizer.offsetWidth}px`;
            }

            Manager.LeftRight.saveCss() ;
        });
        
        document.addEventListener('mouseup', () => {
            if (!isResizing) return;
            isResizing = false;
            document.body.style.cursor = '';
            leftCol.style.userSelect = '';
            leftCol.style.pointerEvents = '';
            rightCol.style.userSelect = '';
            rightCol.style.pointerEvents = '';
        });
        Manager.init() ;
    </script>
